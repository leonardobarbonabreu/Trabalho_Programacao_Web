<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../reset.css">
    <link rel="stylesheet" href="style.css">   
    <title>Leria - Avaliações dos Leitores</title>
</head>
<body>
    <header>
    </header>
    <main>
        <div class="painel">
            <div style="display: flex; flex-direction: column;">
                <h2>O que os leitores dizem!</h2>
            </div>            
            <div>
                <img class="logoLivraria-painel" src="LogoLivraria.svg" alt="">                                                
            </div>            
        </div>

        <div class="sessao-testemunhos" style="margin-bottom: 60px;">
            <div class="cabecalho-sessao-testemunhos">
                <h3>Avaliações dos Leitores</h3>
            </div>
            <div class="grid-testemunhos">

                <figure class="card-testemunho">
                    <blockquote class="texto-testemunho">
                        "A Leria mudou a forma como eu compro livros. Recebi meu pedido em tempo recorde e a embalagem estava impecável!"
                    </blockquote>
                    <figcaption class="autor-testemunho">— Mariana Costa, São Paulo</figcaption>
                </figure>

                <figure class="card-testemunho">
                    <blockquote class="texto-testemunho">
                        "Encontrei edições que eu procurava há anos. O catálogo é enorme e os preços são justos. Recomendo demais!"
                    </blockquote>
                    <figcaption class="autor-testemunho">— Rafael Mendes, Curitiba</figcaption>
                </figure>

                <figure class="card-testemunho">
                    <blockquote class="texto-testemunho">
                        "Participei de um clube de leitura pelo site e foi uma experiência incrível. Já fiz amigos leitores por lá."
                    </blockquote>
                    <figcaption class="autor-testemunho">— Juliana Ferreira, Belo Horizonte</figcaption>
                </figure>

                <figure class="card-testemunho">
                    <blockquote class="texto-testemunho">
                        "O atendimento ao cliente é excepcional. Tive um problema com meu pedido e resolveram tudo em menos de um dia."
                    </blockquote>
                    <figcaption class="autor-testemunho">— Carlos Andrade, Recife</figcaption>
                </figure>

                <figure class="card-testemunho">
                    <blockquote class="texto-testemunho">
                        "As promoções da semana valem muito a pena. Já economizei bastante e minha estante só cresce. Adoro a Leria!"
                    </blockquote>
                    <figcaption class="autor-testemunho">— Beatriz Oliveira, Porto Alegre</figcaption>
                </figure>

                <figure class="card-testemunho">
                    <blockquote class="texto-testemunho">
                        "Site fácil de navegar, entrega rápida e livros em ótimo estado. Não compro em nenhum outro lugar desde que descobri."
                    </blockquote>
                    <figcaption class="autor-testemunho">— Lucas Souza, Fortaleza</figcaption>
                </figure>

            </div>
        </div>

    </main>
    <footer></footer>
</body>
</html>
