<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../reset.css">
    <link rel="stylesheet" href="style.css">   
    <title>Portifólio de Produtos</title>
</head>
<body>
    <header>
        <h1>Portifólio de Produtos</h1>
    </header>
    <main>
        <div class="painel">
            <h2>Sua biblioteca aqui.</h2>
            <img class="logoLivraria-painel" src="LogoLivraria.svg" alt="">            
        </div>

        <div class="categorias">

        </div>
        
        <div>
            <h3>Produtos mais vendidos</h3>
            <div class="grid-produtos">

                <div class="item-prod">
                    <img src="livro1.jpg" alt="">   
                    
                    <p class="descricao-prod">Descrição do produto altamente pertinente</p>
                    
                    <div>
                        <p class="autor-prod"></p>
                        <div class="estrelas-prod">
                            <p>4.5</p>
                            <div class="estrela-marcada"></div>
                            <div class="estrela-marcada"></div>
                            <div class="estrela-marcada"></div>
                            <div class="estrela-marcada"></div>
                            <div class="estrela-desmarcada"></div>
                        </div>
                    </div>
                    <div style="height: 100%; width: 100%; display: flex; align-items: flex-end;">
                        <div class="preco-prod-area">
                            <div>
                                <p>A partir de</p>
                                <p class="preco-prod">R$ 29,90</p>
                            </div>
                        </div>

                    </div>

                </div>


            </div>
        </div>

    </main>
    <footer></footer>
</body>
</html>
