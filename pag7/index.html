<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../reset.css">
    <link rel="stylesheet" href="style.css">   
    <title>Minha página webos</title>
</head>
<body>
<!-- 7 - Página de Login: 
● Tag HTML: <input> 
● Propriedade CSS: border 
Crie uma página de login com campos para nome de usuário e senha utilizando a 
tag <input>. Estilize os campos de entrada aplicando a propriedade border. -->
    <header>            
    </header>
    <main>
        <div class="form-login-area">
            <img class="logoLivraria" src="LogoLivraria.svg" alt="">
            <form id="form-login" action="">
            
                <div class="login-area">
                    <h1>Login</h1>
                    <p>Estamos quase lá...</p>
                </div>

                <div class="input-area">
                    <label class="form-label" for="username">Nome de usuário:</label>
                    <input class="form-input" type="text" id="username" name="username" required>
                </div>

                <div class="input-area">
                    <label class="form-label" for="password">Senha:</label>
                    <input class="form-input" type="password" id="password" name="password" required>
                    <a href="" class="form-link">Esqueceu sua senha?</a>
                </div>

                <button class="form-btn-entrar" type="submit">Entrar</button>

                <div class="form-rodape">
                    <button class="form-btn-voltar" type="button">Voltar</button>                
                    <div>
                        <a href="" class="form-link">Não tenho conta.</a>
                        <a href="" id="criar-conta-link" class="form-link">Quero Criar!</a> 
                    </div>                
                </div>
            </form>        

        </div>
        <div class="painel">
            <h2>Sua biblioteca aqui.</h2>
            <img class="logoLivraria-painel" src="LogoLivraria.svg" alt="">            
        </div>
    </main>
    <footer></footer>
</body>
</html>
